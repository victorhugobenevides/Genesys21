user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}
http {
    include       /etc/nginx/mime.types;
    types { application/wasm wasm; }
    default_type  application/octet-stream;
    client_max_body_size 10M;

    server {
        listen 80;
        server_name _; 

        root /usr/share/nginx/html;
        index index.html;

        # ROTA DE IMAGENS - Servida diretamente pelo disco (Volume montado no Docker)
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            try_files $uri @backend_fallback;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Fallback para o backend caso a imagem ainda não tenha sido processada
        location @backend_fallback {
            proxy_pass http://server:8080;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://server:8080/api/;
            proxy_set_header Host $host;
        }
        
        location /pages {
            proxy_pass http://server:8080/pages;
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
