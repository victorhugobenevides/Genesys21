user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}
http {
    include       /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }
    default_type  application/octet-stream;

    client_max_body_size 10M;

    server {
        listen       80;
        server_name  _; # Catch-all: aceita qualquer domínio (victorbenevides.dev, localhost, IP, etc.)

        root   /usr/share/nginx/html;
        index  index.html;

        add_header Access-Control-Allow-Origin * always;

        # ROTA PARA IMAGENS - Servida diretamente pelo Nginx
        location /uploads/ {
            # O root já é /usr/share/nginx/html, então ele busca em /usr/share/nginx/html/uploads/
            autoindex off;
            expires 7d;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        # API Proxies
        location /upload {
            proxy_pass http://server:8080/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://server:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /pages {
            proxy_pass http://server:8080/pages;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SPA Frontend
        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 404 /index.html;
    }
}
