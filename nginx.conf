user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 10M;

    server {
        listen 80;
        server_name victorbenevides.dev www.victorbenevides.dev radarani.site www.radarani.site localhost;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        root /usr/share/nginx/html;
        index index.html;

        # Relatórios de Cobertura e Screenshots
        location /reports/ {
            alias /usr/share/nginx/html/reports/;
            index index.html;
            autoindex on;
        }

        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            try_files $uri @backend_fallback;
        }

        location @backend_fallback {
            proxy_pass http://server:8080;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://server:8080/api/;
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
