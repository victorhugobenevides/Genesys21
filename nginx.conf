user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }
    default_type  application/octet-stream;
    client_max_body_size 10M;

    server {
        listen       80;
        server_name  _; # Aceita qualquer domínio/IP

        root   /usr/share/nginx/html;
        index  index.html;

        # Otimização de Performance
        sendfile on;
        tcp_nopush on;

        add_header Access-Control-Allow-Origin * always;

        # 1. ROTA DE IMAGENS - Usando ALIAS para evitar erro de path
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            # Se não achar o arquivo físico, tenta repassar pro backend como fallback
            try_files $uri @backend_uploads;
        }

        # Fallback para o backend caso o arquivo físico ainda não tenha sincronizado
        location @backend_uploads {
            proxy_pass http://server:8080;
            proxy_set_header Host $host;
        }

        # 2. FAVICON - Proxy para o backend (já que ele tem essa rota)
        location = /favicon.ico {
            proxy_pass http://server:8080/favicon.ico;
            proxy_set_header Host $host;
        }

        # 3. PROXIES DE API
        location /upload {
            proxy_pass http://server:8080/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://server:8080/api/;
            proxy_set_header Host $host;
        }

        location /pages {
            proxy_pass http://server:8080/pages;
            proxy_set_header Host $host;
        }

        # 4. FRONTEND SPA
        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 404 /index.html;
    }
}
