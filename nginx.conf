user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}
http {
    include       /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }
    default_type  application/octet-stream;

    server {
        listen       80;
        root   /usr/share/nginx/html;
        index  index.html;

        # Content Security Policy (Ponte Firebase + Wasm)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://localhost:8080 http://localhost:8081 https://*.firebaseio.com https://*.googleapis.com;";

        # ESTA É A CONFIGURAÇÃO CRÍTICA PARA SPA (Single Page Application)
        # Se o arquivo não existir fisicamente, ele sempre serve o index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache para ativos estáticos
        location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        error_page 404 /index.html;
    }
}
