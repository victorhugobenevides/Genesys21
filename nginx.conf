user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}
http {
    include       /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }
    default_type  application/octet-stream;

    # Redirecionamento de HTTP para HTTPS
    server {
        listen 80;
        server_name victorbenevides.dev;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Configuração HTTPS
    server {
        listen 443 ssl;
        server_name victorbenevides.dev;

        # Caminhos dos certificados (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/victorbenevides.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/victorbenevides.dev/privkey.pem;

        root   /usr/share/nginx/html;
        index  index.html;

        add_header Access-Control-Allow-Origin * always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src * data: blob:; connect-src * https://*.firebaseio.com https://*.googleapis.com https://www.gstatic.com;" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|mjs|wasm|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1h;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin * always;
        }

        error_page 404 /index.html;
    }
}
