user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}
http {
    include       /etc/nginx/mime.types;
    types { application/wasm wasm; }
    default_type  application/octet-stream;
    client_max_body_size 10M;

    server {
        listen 80;
        server_name _; 

        root /usr/share/nginx/html;
        index index.html;

        # ROTA DE IMAGENS
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            try_files $uri @backend_fallback;
            expires 30d;
            add_header Cache-Control "public";
        }

        location @backend_fallback {
            proxy_pass http://server:8080;
            proxy_set_header Host $host;
        }

        # API PROXIES (Com prefixo /api para não conflitar com rotas da página)
        location /api/cart {
            proxy_pass http://server:8080/cart;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://server:8080/api/;
            proxy_set_header Host $host;
        }
        
        location /pages {
            proxy_pass http://server:8080/pages;
            proxy_set_header Host $host;
        }

        # FRONTEND SPA (Essa regra garante que /cart carregue o index.html)
        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 404 /index.html;
    }
}
