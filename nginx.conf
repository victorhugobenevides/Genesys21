user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}
http {
    include       /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }
    default_type  application/octet-stream;

    server {
        listen       80;
        root   /usr/share/nginx/html;
        index  index.html;

        # Content Security Policy (CSP) Atualizada
        # 1. Adicionado https://www.gstatic.com em connect-src para permitir carregar Source Maps (.js.map) do Firebase
        # 2. Mantido img-src * para carregar imagens do seu servidor Ktor (:8080)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src * data: blob:; connect-src 'self' http://localhost:8080 http://localhost:8081 https://*.firebaseio.com https://*.googleapis.com https://www.gstatic.com;" always;
        
        add_header Access-Control-Allow-Origin * always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|mjs|wasm|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1h;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin * always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src * data: blob:; connect-src 'self' http://localhost:8080 http://localhost:8081 https://*.firebaseio.com https://*.googleapis.com https://www.gstatic.com;" always;
        }

        error_page 404 /index.html;
    }
}
