user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}
http {
    include       /etc/nginx/mime.types;
    types { application/wasm wasm; }
    default_type  application/octet-stream;
    client_max_body_size 10M;

    # REDIRECIONAMENTO HTTP -> HTTPS
    server {
        listen 80;
        server_name victorbenevides.dev www.victorbenevides.dev radarani.site www.radarani.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # CONFIGURAÇÃO HTTPS
    server {
        listen 443 ssl;
        server_name victorbenevides.dev www.victorbenevides.dev radarani.site www.radarani.site;

        # CERTIFICADOS (O Certbot salvará aqui)
        # Nota: Se você gerou um certificado UNIFICADO, use o caminho do victorbenevides.dev
        # Se gerou separado, você precisará de blocos 'server' separados para cada domínio.
        ssl_certificate /etc/letsencrypt/live/victorbenevides.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/victorbenevides.dev/privkey.pem;

        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        root /usr/share/nginx/html;
        index index.html;

        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            try_files $uri @backend_fallback;
            expires 30d;
            add_header Cache-Control "public";
        }

        location @backend_fallback {
            proxy_pass http://server:8080;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://server:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 404 /index.html;
    }
}
