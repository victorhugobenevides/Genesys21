user  nginx;
worker_processes  auto;
events {
    worker_connections  1024;
}
http {
    include       /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }
    default_type  application/octet-stream;

    # Limite de upload aumentado para 10MB
    client_max_body_size 10M;

    server {
        listen       80;
        server_name  localhost victorbenevides.dev;

        root   /usr/share/nginx/html;
        index  index.html;

        # Configurações de Cabeçalhos
        add_header Access-Control-Allow-Origin * always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # 1. ROTA PARA SUBIR IMAGENS (POST)
        location /upload {
            proxy_pass http://server:8080/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. ROTA PARA VER IMAGENS (Servida diretamente pelo Nginx para evitar 404)
        location ^~ /uploads/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # 3. ROTAS DE API (Pages, etc)
        location /api/ {
            proxy_pass http://server:8080/api/;
            proxy_set_header Host $host;
        }

        location /pages {
            proxy_pass http://server:8080/pages;
            proxy_set_header Host $host;
        }

        # 4. FRONTEND (WasmJs SPA)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache para arquivos do App (Ignora a pasta /uploads/ devido ao ^~ acima)
        location ~* \.(js|mjs|wasm|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1h;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin * always;
            try_files $uri =404;
        }

        error_page 404 /index.html;
    }
}
