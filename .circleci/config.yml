version: 2.1

orbs:
  android: circleci/android@2.5.0

jobs:
  test-and-validate:
    executor:
      name: android/android-machine
      resource-class: large
      tag: 2024.01.1
    steps:
      - checkout
      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew
      - run:
          name: Decode Google Services JSON (Android)
          command: |
            if [ -z "$GOOGLE_SERVICES_JSON_ANDROID" ]; then
              echo "Error: GOOGLE_SERVICES_JSON_ANDROID environment variable is not set."
              exit 1
            fi
            CLEAN_VAR=$(echo "$GOOGLE_SERVICES_JSON_ANDROID" | tr -d '[:space:]')
            DECODED=$(echo "$CLEAN_VAR" | base64 --decode 2>/dev/null || echo "failed")
            if echo "$DECODED" | grep -q "project_info"; then
              echo "$DECODED" > composeApp/google-services.json
              echo "✓ Decoded from Base64"
            elif echo "$GOOGLE_SERVICES_JSON_ANDROID" | grep -q "project_info"; then
              echo "$GOOGLE_SERVICES_JSON_ANDROID" > composeApp/google-services.json
              echo "✓ Used raw text (contains project_info)"
            else
              echo "CRITICAL ERROR: Variable content does not appear to be a valid google-services.json."
              exit 1
            fi
      - run:
          name: Decode Firebase Admin JSON (Server)
          command: |
            if [ -z "$FIREBASE_ADMIN_JSON" ]; then
              echo "Warning: FIREBASE_ADMIN_JSON not set. Server tests might fail."
            else
              mkdir -p server/src/main/resources
              echo "${FIREBASE_ADMIN_JSON}" > server/src/main/resources/firebase-adminsdk.json
              echo "${FIREBASE_ADMIN_JSON}" > firebase-adminsdk.json
            fi
      - run:
          name: Run Unit Tests & Coverage
          command: |
            ./gradlew :composeApp:testDebugUnitTest :shared:testDebugUnitTest :server:test -Pandroid.useAndroidX=true --no-daemon || true
            ./gradlew :composeApp:jacocoTestReport :shared:jacocoTestReport :server:jacocoTestReport --no-daemon || true
      - run:
          name: Verify Visual Integrity (Screenshot Tests)
          command: ./gradlew :screenshot-tests:verifyPaparazziDebug --no-daemon || true
      - persist_to_workspace:
          root: .
          paths:
            - screenshot-tests/build/reports/paparazzi
            - composeApp/jacoco-reports
            - shared/jacoco-reports
            - server/jacoco-reports
            - shared/build/reports/tests
            - composeApp/build/reports/tests
            - server/build/reports/tests
      - store_test_results:
          path: /tmp/test-results

  deploy-to-oracle:
    docker:
      - image: cimg/openjdk:21.0
    environment:
      DOCKER_API_VERSION: "1.41"
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup_remote_docker:
          version: 20.10.24
          docker_layer_caching: true
      - run:
          name: Build Distribution
          command: ./gradlew :server:installDist :composeApp:wasmJsBrowserDistribution -Pandroid.useAndroidX=true --no-daemon
      - run:
          name: Prepare Deploy Content & Docker Push
          command: |
            mkdir -p deploy/server deploy/web/reports/paparazzi deploy/web/reports/shared deploy/web/reports/app deploy/web/reports/server deploy/web/reports/coverage/app deploy/web/reports/coverage/shared deploy/web/reports/coverage/server
            cp -R server/build/install/server/. deploy/server/
            cp firebase-adminsdk.json deploy/server/bin/ 2>/dev/null || true
            find composeApp/build/dist/wasmJs/productionExecutable -type f \( -name "*.js" -o -name "*.wasm" -o -name "*.html" -o -name "*.css" -o -name "*.mjs" -o -name "*.map" \) -exec cp -f {} deploy/web/ \;

            # Copiar Relatórios
            [ -d "screenshot-tests/build/reports/paparazzi/debug" ] && cp -R screenshot-tests/build/reports/paparazzi/debug/* deploy/web/reports/paparazzi/ || true
            [ -d "shared/build/reports/tests/testDebugUnitTest" ] && cp -R shared/build/reports/tests/testDebugUnitTest/* deploy/web/reports/shared/ || true
            [ -d "composeApp/build/reports/tests/testDebugUnitTest" ] && cp -R composeApp/build/reports/tests/testDebugUnitTest/* deploy/web/reports/app/ || true
            [ -d "server/build/reports/tests/test" ] && cp -R server/build/reports/tests/test/* deploy/web/reports/server/ || true

            # Coverage
            [ -d "composeApp/jacoco-reports/html" ] && cp -R composeApp/jacoco-reports/html/* deploy/web/reports/coverage/app/ || true
            [ -d "shared/jacoco-reports/html" ] && cp -R shared/jacoco-reports/html/* deploy/web/reports/coverage/shared/ || true
            [ -d "server/jacoco-reports/html" ] && cp -R server/jacoco-reports/html/* deploy/web/reports/coverage/server/ || true

            # Gerar ponte Firebase
            cat \<<EOF > deploy/web/firebase-bridge.js
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
            import { getAuth, signInWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
            const firebaseConfig = {
                apiKey: "AIzaSyCq22tklAK0iQd4jWDINkJZAS9-I_-dLSY",
                authDomain: "genesys21-32035.firebaseapp.com",
                projectId: "genesys21-32035",
                storageBucket: "genesys21-32035.firebasestorage.app",
                appId: "1:674755208954:web:26e7b20a54f9ceb0dc4b43"
            };
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            window.firebaseSignIn = async (email, pass) => {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                return await userCredential.user.getIdToken();
            };
            window.firebaseSignInGoogle = async () => {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                return await result.user.getIdToken();
            };
            window.firebaseGetToken = async () => auth.currentUser ? await auth.currentUser.getIdToken() : null;
            window.firebaseGetUserId = async () => auth.currentUser ? auth.currentUser.uid : null;
            window.firebaseSignOut = async () => await signOut(auth);
            EOF

            # Gerar index.html
            cat \<<EOF > deploy/web/index.html
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
                <title>Genesys21</title>
                <link rel="preload" href="/composeApp.wasm" as="fetch" type="application/wasm" crossorigin>
                <script async src="https://www.googletagmanager.com/gtag/js?id=G-LW7Y13Y2M8"></script>
                <script>
                    window.dataLayer = window.dataLayer || [];
                    function gtag(){dataLayer.push(arguments);}
                    gtag('js', new Date());
                    gtag('config', 'G-LW7Y13Y2M8');
                </script>
                <script>if(!window.crypto.randomUUID){window.crypto.randomUUID=function(){return([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));};}</script>
                <script type="module" src="/firebase-bridge.js"></script>
                <style>
                    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #F2F2F7; position: fixed; left: 0; top: 0; touch-action: manipulation; }
                    #ComposeTarget { width: 100%; height: 100%; }
                    canvas { outline: none; width: 100% !important; height: 100% !important; display: block; }
                    input, textarea { font-size: 16px !important; }
                </style>
            </head>
            <body>
                <canvas id="ComposeTarget"></canvas>
                <script type="module" src="/composeApp.js"></script>
            </body>
            </html>
            EOF

            # Docker Login OCIR
            echo "$OCI_AUTH_TOKEN" | docker login ${OCI_REGION}.ocir.io -u "${OCI_TENANCY_NAMESPACE}/${OCI_USER}" --password-stdin

            # Build and Push
            REGISTRY=${OCI_REGION}.ocir.io/${OCI_TENANCY_NAMESPACE}
            docker build -t $REGISTRY/genesys-server:latest -f Dockerfile.server .
            docker build -t $REGISTRY/genesys-web:latest -f Dockerfile.web .
            docker push $REGISTRY/genesys-server:latest
            docker push $REGISTRY/genesys-web:latest
      - run:
          name: Setup SSH Key
          command: |
            mkdir -p ~/.ssh
            CLEAN_HOST=$(echo "${OCI_HOST}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's|https://||' -e 's|http://||' -e 's|/.*||')
            echo "export CLEAN_HOST=${CLEAN_HOST}" >> $BASH_ENV

            if [ -z "${OCI_SSH_KEY}" ]; then
              echo "ERROR: OCI_SSH_KEY is empty!"
              exit 1
            fi

            # Usa Python para reconstruir a chave de forma robusta (Base64 ou Raw)
            python3 -c "
            import os, base64
            key = os.environ['OCI_SSH_KEY'].strip()
            path = os.path.expanduser('~/.ssh/oracle_key')
            with open(path, 'wb') as f:
                try:
                    # Tenta decodificar como base64
                    f.write(base64.b64decode(key))
                except:
                    # Se falhar, assume que é a chave bruta
                    f.write(key.encode())
            "

            chmod 600 ~/.ssh/oracle_key

            if ! grep -q "PRIVATE KEY" ~/.ssh/oracle_key; then
              echo "ERROR: The key file is invalid or it is a PUBLIC key instead of PRIVATE."
              echo "Check if OCI_SSH_KEY in CircleCI is correct."
              exit 1
            fi

            ssh-keygen -l -f ~/.ssh/oracle_key
            ssh-keyscan -H "${CLEAN_HOST}" >> ~/.ssh/known_hosts
      - run:
          name: SSH Deploy to Oracle Cloud
          command: |
            source $BASH_ENV

            # 1. Gerar Nginx de Produção (HTTP temporário para validação de certificados)
            printf "user  nginx;\nworker_processes  auto;\nevents { worker_connections  1024; }\nhttp {\n    include /etc/nginx/mime.types;\n    types { application/wasm wasm; }\n    default_type application/octet-stream;\n    client_max_body_size 50M;\n    gzip on;\n    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;\n    server {\n        listen 80;\n        server_name victorbenevides.dev www.victorbenevides.dev radarani.site www.radarani.site;\n        location /.well-known/acme-challenge/ { root /var/www/certbot; }\n        root /usr/share/nginx/html;\n        index index.html;\n        location ^~ /api/ {\n            proxy_pass http://server:8080;\n            proxy_set_header Host \$host;\n            proxy_set_header X-Real-IP \$remote_addr;\n        }\n        location /uploads/ {\n            alias /usr/share/nginx/html/uploads/;\n            try_files \$uri @backend_fallback;\n        }\n        location @backend_fallback { proxy_pass http://server:8080; }\n        location / {\n            try_files \$uri \$uri/ /index.html;\n        }\n    }\n}\n" > nginx.prod.conf

            # 2. Gerar Docker Compose usando imagens do OCIR via printf
            REGISTRY="${OCI_REGION}.ocir.io/${OCI_TENANCY_NAMESPACE}"
            printf "services:\n  server:\n    image: ${REGISTRY}/genesys-server:latest\n    volumes:\n      - ./data:/app/data\n      - ./uploads:/app/uploads\n    restart: unless-stopped\n    networks:\n      - genesys-network\n  web:\n    image: ${REGISTRY}/genesys-web:latest\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n    volumes:\n      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro\n      - ./uploads:/usr/share/nginx/html/uploads:ro\n      - ./certbot/conf:/etc/letsencrypt:ro\n      - ./certbot/www:/var/www/certbot:ro\n    restart: unless-stopped\n    networks:\n      - genesys-network\n  certbot:\n    image: certbot/certbot\n    volumes:\n      - ./certbot/conf:/etc/letsencrypt\n      - ./certbot/www:/var/www/certbot\n    networks:\n      - genesys-network\n    entrypoint: \"/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait \$\${!}; done'\"\nnetworks:\n  genesys-network:\n    driver: bridge\n" > docker-compose.yml

            # 3. Transferir arquivos e executar comandos via SSH
            ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o PubkeyAcceptedAlgorithms=+ssh-rsa ubuntu@${CLEAN_HOST} "mkdir -p ~/app"
            scp -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no nginx.prod.conf docker-compose.yml ubuntu@${CLEAN_HOST}:~/app/

            # Execução remota garantindo que as variáveis de ambiente locais sejam passadas
            ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o PubkeyAcceptedAlgorithms=+ssh-rsa ubuntu@${CLEAN_HOST} "
              set -e
              cd ~/app
              echo \"${OCI_AUTH_TOKEN}\" | sudo docker login ${OCI_REGION}.ocir.io -u \"${OCI_TENANCY_NAMESPACE}/${OCI_USER}\" --password-stdin

              if sudo docker compose version >/dev/null 2>&1; then
                DOCKER_CMD=\"sudo docker compose\"
              else
                DOCKER_CMD=\"sudo docker-compose\"
              fi

              \$DOCKER_CMD pull
              \$DOCKER_CMD down --remove-orphans || true
              \$DOCKER_CMD up -d
              sudo docker image prune -f
            "

workflows:
  version: 2
  validate-and-deploy:
    jobs:
      - test-and-validate
      - deploy-to-oracle:
          requires:
            - test-and-validate
          filters:
            branches:
              only: main
