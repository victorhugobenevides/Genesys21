name: CI - Multiplatform Test & Build Validation

workflow_dispatch:

on:
  push:
    branches: [ main, develop, "release/*", "hotfix/*" ]
  pull_request:
    branches: [ main, develop, "release/*", "hotfix/*" ]

jobs:
  test-and-validate-android-server-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Google Services JSON (Android)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}' > composeApp/google-services.json

      - name: Decode Firebase Admin JSON (Server)
        run: |
          mkdir -p server/src/main/resources
          echo '${{ secrets.FIREBASE_ADMIN_JSON }}' > server/src/main/resources/genesys21-32035-firebase-adminsdk-fbsvc-d57f39d3c3.json

      - name: Run Unit Tests (Common & Android)
        run: ./gradlew :composeApp:testDebugUnitTest :shared:testDebugUnitTest -Pandroid.useAndroidX=true

      - name: Build Server & Run Tests
        run: ./gradlew :server:test :server:build -Pandroid.useAndroidX=true

      - name: Validate WasmJs Compilation
        run: ./gradlew :composeApp:compileKotlinWasmJs -Pandroid.useAndroidX=true

  test-and-validate-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Google Service Info Plist (iOS)
        run: echo '${{ secrets.GOOGLE_SERVICES_PLIST_IOS }}' > iosApp/iosApp/GoogleService-Info.plist

      - name: Build iOS Framework (Link Validation)
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 -Pandroid.useAndroidX=true

      - name: Validate Xcode Build (Simulated)
        working-directory: iosApp
        run: |
          xcodebuild -project iosApp.xcodeproj \
                     -scheme iosApp \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     build \
                     CODE_SIGNING_ALLOWED=NO

  coverage-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport || true # Allow failure to check coverage report anyway
      - name: Verify coverage report exists
        run: |
          if [ ! -f "composeApp/build/reports/jacoco/test/html/index.html" ]; then
            echo "Coverage report not found. Skipping threshold check."
          else
            # Extract coverage percentage (simplified check)
            echo "Coverage report found."
          fi
