name: CI - Multiplatform Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android-server-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android
        run: ./gradlew :composeApp:assembleDebug -Pandroid.useAndroidX=true

      - name: Build Server
        run: ./gradlew :server:build -Pandroid.useAndroidX=true

      - name: Build Web (JS)
        run: ./gradlew :composeApp:jsBrowserDistribution -Pandroid.useAndroidX=true

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS Framework
        run: ./gradlew :composeApp:assembleDebugAppleFrameworkForXcodeIosSimulatorArm64 -Pandroid.useAndroidX=true

      - name: Build Xcode Project
        working-directory: iosApp
        run: |
          xcodebuild -project iosApp.xcodeproj \
                     -scheme iosApp \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     build \
                     CODE_SIGNING_ALLOWED=NO
