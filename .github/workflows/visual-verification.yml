name: Visual Verification

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  screenshot-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify Visual Integrity (Paparazzi)
        run: ./gradlew :screenshot-tests:verifyPaparazziDebug --no-daemon

      - name: Upload Test Report (On Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-report
          path: screenshot-tests/build/reports/paparazzi/
          retention-days: 7

      - name: Upload New Snapshots (On Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-failures
          path: screenshot-tests/src/test/snapshots/failures/
          retention-days: 7
