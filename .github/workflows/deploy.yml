name: Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build Project
        run: |
          ./gradlew :server:installDist :composeApp:wasmJsBrowserDevelopmentExecutableDistribution --no-daemon
          
      - name: Prepare Deploy Folder
        run: |
          mkdir -p deploy/server deploy/web
          cp -R server/build/install/server/. deploy/server/
          find composeApp/build/dist/wasmJs/developmentExecutable -type f \( -name "*.js" -o -name "*.wasm" -o -name "*.html" -o -name "*.css" -o -name "*.mjs" -o -name "*.map" \) -exec cp -f {} deploy/web/ \;
          
          # Gerar ponte Firebase e index.html
          cat <<EOF > deploy/web/firebase-bridge.js
          import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
          import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
          const firebaseConfig = {
              apiKey: "AIzaSyCq22tklAK0iQd4jWDINkJZAS9-I_-dLSY",
              authDomain: "genesys21-32035.firebaseapp.com",
              projectId: "genesys21-32035",
              storageBucket: "genesys21-32035.firebasestorage.app",
              appId: "1:674755208954:web:26e7b20a54f9ceb0dc4b43"
          };
          const app = initializeApp(firebaseConfig);
          const auth = getAuth(app);
          window.firebaseSignIn = async (email, pass) => {
              const userCredential = await signInWithEmailAndPassword(auth, email, pass);
              return await userCredential.user.getIdToken();
          };
          window.firebaseGetToken = async () => auth.currentUser ? await auth.currentUser.getIdToken() : null;
          window.firebaseSignOut = async () => await signOut(auth);
          EOF

          cat <<EOF > deploy/web/index.html
          <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><base href="/"><title>Genesys21</title><script type="module" src="/firebase-bridge.js"></script><style>html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background-color:#F2F2F7;}#ComposeTarget{width:100%;height:100%;}</style></head><body><canvas id="ComposeTarget"></canvas><script type="module" src="/composeApp.js"></script></body></html>
          EOF

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/genesys-server:latest -f Dockerfile.server .
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/genesys-web:latest -f Dockerfile.web .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/genesys-server:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/genesys-web:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app && cd ~/app
            cat <<EOF > docker-compose.yml
            services:
              server:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/genesys-server:latest
                ports:
                  - "8080:8080"
                environment:
                  - PUBLIC_HOST=ec2-18-230-62-165.sa-east-1.compute.amazonaws.com
                volumes:
                  - ./data/server:/app/bin/data
                  - ./uploads:/app/bin/uploads
                restart: unless-stopped
              web:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/genesys-web:latest
                ports:
                  - "80:80"
                restart: unless-stopped
            EOF
            docker compose pull
            docker compose up -d
            docker image prune -f
