name: Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Firebase Secrets
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}' > composeApp/google-services.json
          mkdir -p server/src/main/resources
          echo '${{ secrets.FIREBASE_ADMIN_JSON }}' > server/src/main/resources/firebase-adminsdk.json
          echo '${{ secrets.FIREBASE_ADMIN_JSON }}' > firebase-adminsdk.json

      - name: Build Project
        run: |
          ./gradlew :server:installDist :composeApp:wasmJsBrowserDevelopmentExecutableDistribution -Pandroid.useAndroidX=true --no-daemon
          
      - name: Prepare Deploy Folder
        run: |
          mkdir -p deploy/server deploy/web
          cp -R server/build/install/server/. deploy/server/
          cp firebase-adminsdk.json deploy/server/bin/
          find composeApp/build/dist/wasmJs/developmentExecutable -type f \( -name "*.js" -o -name "*.wasm" -o -name "*.html" -o -name "*.css" -o -name "*.mjs" -o -name "*.map" \) -exec cp -f {} deploy/web/ \;
          
          cat <<EOF > deploy/web/firebase-bridge.js
          import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
          import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
          const firebaseConfig = {
              apiKey: "AIzaSyCq22tklAK0iQd4jWDINkJZAS9-I_-dLSY",
              authDomain: "genesys21-32035.firebaseapp.com",
              projectId: "genesys21-32035",
              storageBucket: "genesys21-32035.firebasestorage.app",
              appId: "1:674755208954:web:26e7b20a54f9ceb0dc4b43"
          };
          const app = initializeApp(firebaseConfig);
          const auth = getAuth(app);
          window.firebaseSignIn = async (email, pass) => {
              const userCredential = await signInWithEmailAndPassword(auth, email, pass);
              return await userCredential.user.getIdToken();
          };
          window.firebaseGetToken = async () => auth.currentUser ? await auth.currentUser.getIdToken() : null;
          window.firebaseSignOut = async () => await signOut(auth);
          EOF
          cat <<EOF > deploy/web/index.html
          <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><base href="/"><title>Genesys21</title>
          <script>if(!window.crypto.randomUUID){window.crypto.randomUUID=function(){return([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));};}</script>
          <script type="module" src="/firebase-bridge.js"></script><style>html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background-color:#F2F2F7;}#ComposeTarget{width:100%;height:100%;}</style></head><body><canvas id="ComposeTarget"></canvas><script type="module" src="/composeApp.js"></script></body></html>
          EOF

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Multi-arch Images
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t ${{ secrets.DOCKERHUB_USERNAME }}/genesys-server:latest -f Dockerfile.server --push .
          docker buildx build --platform linux/amd64,linux/arm64 -t ${{ secrets.DOCKERHUB_USERNAME }}/genesys-web:latest -f Dockerfile.web --push .

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app/certbot/conf ~/app/certbot/www && cd ~/app
            
            # Criamos um Nginx exclusivo para Produção com SSL
            cat <<EOF > nginx.prod.conf
            user  nginx;
            worker_processes  auto;
            events { worker_connections  1024; }
            http {
                include /etc/nginx/mime.types;
                types { application/wasm wasm; }
                default_type application/octet-stream;

                # HTTP -> Redireciona para HTTPS
                server {
                    listen 80;
                    server_name victorbenevides.dev;
                    location /.well-known/acme-challenge/ { root /var/www/certbot; }
                    location / { return 301 https://\$host\$request_uri; }
                }

                # HTTPS
                server {
                    listen 443 ssl;
                    server_name victorbenevides.dev;
                    ssl_certificate /etc/letsencrypt/live/victorbenevides.dev/fullchain.pem;
                    ssl_certificate_key /etc/letsencrypt/live/victorbenevides.dev/privkey.pem;

                    root /usr/share/nginx/html;
                    index index.html;
                    add_header Access-Control-Allow-Origin * always;
                    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src * data: blob:; connect-src * https://*.firebaseio.com https://*.googleapis.com https://www.gstatic.com;" always;

                    location / { try_files \$uri \$uri/ /index.html; }
                    location ~* \.(js|mjs|wasm|css|png|jpg|jpeg|gif|ico|svg)$ {
                        expires 1h;
                        add_header Cache-Control "public, no-transform";
                    }
                }
            }
            EOF

            cat <<EOF > docker-compose.yml
            services:
              server:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/genesys-server:latest
                ports:
                  - "8080:8080"
                environment:
                  - PUBLIC_HOST=victorbenevides.dev
                volumes:
                  - ./data:/app/data
                  - ./uploads:/app/uploads
                restart: unless-stopped
              web:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/genesys-web:latest
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
                  - ./certbot/conf:/etc/letsencrypt:ro
                  - ./certbot/www:/var/www/certbot:ro
                restart: unless-stopped
            EOF
            docker compose pull
            docker compose up -d
            docker image prune -f
