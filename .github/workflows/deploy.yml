name: Deploy to Oracle Cloud (OCIR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify Visual Integrity (Screenshot Tests)
        run: ./gradlew :screenshot-tests:verifyPaparazziDebug --no-daemon || true

      - name: Run Unit Tests & Coverage
        run: |
          ./gradlew :shared:testDebugUnitTest :composeApp:testDebugUnitTest :server:test --no-daemon || true
          ./gradlew :composeApp:jacocoTestReport :shared:jacocoTestReport :server:jacocoTestReport --no-daemon || true

      - name: Decode Firebase Secrets
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}' > composeApp/google-services.json
          mkdir -p server/src/main/resources
          echo '${{ secrets.FIREBASE_ADMIN_JSON }}' > server/src/main/resources/firebase-adminsdk.json
          echo '${{ secrets.FIREBASE_ADMIN_JSON }}' > firebase-adminsdk.json

      - name: Build Project
        run: |
          ./gradlew :server:installDist :composeApp:wasmJsBrowserProductionExecutableDistribution -Pandroid.useAndroidX=true --no-daemon

      - name: Prepare Deploy Folder
        run: |
          mkdir -p deploy/server deploy/web/reports/paparazzi deploy/web/reports/shared deploy/web/reports/app deploy/web/reports/server deploy/web/reports/coverage/app deploy/web/reports/coverage/shared deploy/web/reports/coverage/server
          cp -R server/build/install/server/. deploy/server/
          cp firebase-adminsdk.json deploy/server/bin/
          find composeApp/build/dist/wasmJs/productionExecutable -type f \( -name "*.js" -o -name "*.wasm" -o -name "*.html" -o -name "*.css" -o -name "*.mjs" -o -name "*.map" \) -exec cp -f {} deploy/web/ \;

          # Copiar Relatórios
          [ -d "screenshot-tests/build/reports/paparazzi/debug" ] && cp -R screenshot-tests/build/reports/paparazzi/debug/* deploy/web/reports/paparazzi/ || true
          [ -d "shared/build/reports/tests/testDebugUnitTest" ] && cp -R shared/build/reports/tests/testDebugUnitTest/* deploy/web/reports/shared/ || true
          [ -d "composeApp/build/reports/tests/testDebugUnitTest" ] && cp -R composeApp/build/reports/tests/testDebugUnitTest/* deploy/web/reports/app/ || true
          [ -d "server/build/reports/tests/test" ] && cp -R server/build/reports/tests/test/* deploy/web/reports/server/ || true

          # Coverage
          [ -d "composeApp/jacoco-reports/html" ] && cp -R composeApp/jacoco-reports/html/* deploy/web/reports/coverage/app/ || true
          [ -d "shared/jacoco-reports/html" ] && cp -R shared/jacoco-reports/html/* deploy/web/reports/coverage/shared/ || true
          [ -d "server/jacoco-reports/html" ] && cp -R server/jacoco-reports/html/* deploy/web/reports/coverage/server/ || true

          # Gerar ponte Firebase
          cat <<EOF > deploy/web/firebase-bridge.js
          import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
          import { getAuth, signInWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
          const firebaseConfig = {
              apiKey: "AIzaSyCq22tklAK0iQd4jWDINkJZAS9-I_-dLSY",
              authDomain: "genesys21-32035.firebaseapp.com",
              projectId: "genesys21-32035",
              storageBucket: "genesys21-32035.firebasestorage.app",
              appId: "1:674755208954:web:26e7b20a54f9ceb0dc4b43"
          };
          const app = initializeApp(firebaseConfig);
          const auth = getAuth(app);
          window.firebaseSignIn = async (email, pass) => {
              const userCredential = await signInWithEmailAndPassword(auth, email, pass);
              return await userCredential.user.getIdToken();
          };
          window.firebaseSignInGoogle = async () => {
              const provider = new GoogleAuthProvider();
              const result = await signInWithPopup(auth, provider);
              return await result.user.getIdToken();
          };
          window.firebaseGetToken = async () => auth.currentUser ? await auth.currentUser.getIdToken() : null;
          window.firebaseGetUserId = async () => auth.currentUser ? auth.currentUser.uid : null;
          window.firebaseSignOut = async () => await signOut(auth);
          EOF

          # Gerar index.html
          cat <<EOF > deploy/web/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
              <title>Genesys21</title>
              <link rel="preload" href="/composeApp.wasm" as="fetch" type="application/wasm" crossorigin>
              <script async src="https://www.googletagmanager.com/gtag/js?id=G-LW7Y13Y2M8"></script>
              <script>
                  window.dataLayer = window.dataLayer || [];
                  function gtag(){dataLayer.push(arguments);}
                  gtag('js', new Date());
                  gtag('config', 'G-LW7Y13Y2M8');
              </script>
              <script>if(!window.crypto.randomUUID){window.crypto.randomUUID=function(){return([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));};}</script>
              <script type="module" src="/firebase-bridge.js"></script>
              <style>
                  html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #F2F2F7; position: fixed; left: 0; top: 0; touch-action: manipulation; }
                  #ComposeTarget { width: 100%; height: 100%; }
                  canvas { outline: none; width: 100% !important; height: 100% !important; display: block; }
                  input, textarea { font-size: 16px !important; }
              </style>
          </head>
          <body>
              <canvas id="ComposeTarget"></canvas>
              <script type="module" src="/composeApp.js"></script>
          </body>
          </html>
          EOF

      - name: Login to Oracle Cloud Infrastructure Registry (OCIR)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGION }}.ocir.io
          username: ${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USER }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and Push Multi-arch Images to OCIR
        run: |
          REGISTRY=${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}
          docker buildx build --platform linux/amd64,linux/arm64 -t $REGISTRY/genesys-server:latest -f Dockerfile.server --push .
          docker buildx build --platform linux/amd64,linux/arm64 -t $REGISTRY/genesys-web:latest -f Dockerfile.web --push .

      - name: Deploy to Oracle Cloud via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            mkdir -p ~/app/certbot/conf ~/app/certbot/www && cd ~/app

            # Login no OCIR na instância para permitir o pull
            echo "${{ secrets.OCI_AUTH_TOKEN }}" | sudo docker login ${{ secrets.OCI_REGION }}.ocir.io -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USER }}" --password-stdin

            # Gerar Nginx de Produção com literal strings
            cat <<'EOF' > nginx.prod.conf
            user  nginx;
            worker_processes  auto;
            events { worker_connections  1024; }
            http {
                include /etc/nginx/mime.types;
                types { application/wasm wasm; }
                default_type application/octet-stream;
                client_max_body_size 50M;
                gzip on;
                gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;

                server {
                    listen 80;
                    server_name victorbenevides.dev www.victorbenevides.dev radarani.site www.radarani.site;
                    location /.well-known/acme-challenge/ { root /var/www/certbot; }
                    location / { return 301 https://$host$request_uri; }
                }

                server {
                    listen 443 ssl;
                    server_name victorbenevides.dev www.victorbenevides.dev radarani.site www.radarani.site;
                    ssl_certificate /etc/letsencrypt/live/victorbenevides.dev/fullchain.pem;
                    ssl_certificate_key /etc/letsencrypt/live/victorbenevides.dev/privkey.pem;
                    ssl_protocols TLSv1.2 TLSv1.3;

                    root /usr/share/nginx/html;
                    index index.html;

                    location ^~ /api/ {
                        proxy_pass http://server:8080;
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                    }

                    location /uploads/ {
                        alias /usr/share/nginx/html/uploads/;
                        try_files $uri @backend_fallback;
                    }

                    location @backend_fallback { proxy_pass http://server:8080; }

                    location / {
                        try_files $uri $uri/ /index.html;
                    }
                }
            }
EOF

            # Gerar Docker Compose usando imagens do OCIR
            cat <<EOF > docker-compose.yml
            services:
              server:
                image: ${REGISTRY}/genesys-server:latest
                volumes:
                  - ./data:/app/data
                  - ./uploads:/app/uploads
                restart: unless-stopped
                networks:
                  - genesys-network
              web:
                image: ${REGISTRY}/genesys-web:latest
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
                  - ./uploads:/usr/share/nginx/html/uploads:ro
                  - ./certbot/conf:/etc/letsencrypt:ro
                  - ./certbot/www:/var/www/certbot:ro
                restart: unless-stopped
                networks:
                  - genesys-network
              certbot:
                image: certbot/certbot
                volumes:
                  - ./certbot/conf:/etc/letsencrypt
                  - ./certbot/www:/var/www/certbot
                networks:
                  - genesys-network
                entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait \$\${!}; done'"
            networks:
              genesys-network:
                driver: bridge
EOF

            # Tenta usar docker compose (V2) ou docker-compose (V1) com sudo
            if sudo docker compose version >/dev/null 2>&1; then
              DOCKER_CMD="sudo docker compose"
            else
              DOCKER_CMD="sudo docker-compose"
            fi

            $DOCKER_CMD pull
            $DOCKER_CMD up -d --force-recreate
            sudo docker image prune -f
