services:
  server:
    image: ${DOCKERHUB_USERNAME}/genesys-server:latest
    ports:
      - "8080:8080"
    environment:
      - PUBLIC_HOST=seu-dominio.com.br
    volumes:
      - ./data/server:/app/bin/data
      - ./uploads:/app/bin/uploads
    restart: unless-stopped
    networks:
      - genesys-network

  web:
    image: ${DOCKERHUB_USERNAME}/genesys-web:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    restart: unless-stopped
    networks:
      - genesys-network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  genesys-network:
    driver: bridge
