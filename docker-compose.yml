services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    volumes:
      - ./data/server:/app/bin/data # Persiste o banco SQLite
      - ./uploads:/app/bin/uploads   # Persiste as imagens enviadas
    restart: unless-stopped
    networks:
      - genesys-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - genesys-network

networks:
  genesys-network:
    driver: bridge
