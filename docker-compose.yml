services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      - PUBLIC_HOST=localhost
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - genesys-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "80:80"
    volumes:
      # Mantemos apenas o volume das fotos. 
      # A config do Nginx agora vai dentro da imagem para evitar erros na AWS.
      - ./uploads:/usr/share/nginx/html/uploads:ro
    restart: unless-stopped
    networks:
      - genesys-network

networks:
  genesys-network:
    driver: bridge
