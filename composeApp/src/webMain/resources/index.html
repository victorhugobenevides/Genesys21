<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Social Bio</title>
    <link type="text/css" rel="stylesheet" href="/styles.css">
    <style>
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #F2F2F7; position: fixed; left: 0; top: 0; touch-action: none;
        }
        #ComposeTarget { width: 100%; height: 100%; }
        canvas { outline: none; width: 100% !important; height: 100% !important; display: block; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // USO DE globalThis PARA MÁXIMA COMPATIBILIDADE COM AMBIENTES RESTRITOS (SES)
        globalThis.FirebaseAuthBridge = {
            ready: false,
            signIn: (email, password) => firebase.auth().signInWithEmailAndPassword(email, password).then(r => r.user.getIdToken()),
            signOut: () => firebase.auth().signOut(),
            getCurrentUserToken: () => new Promise(res => {
                const unsub = firebase.auth().onAuthStateChanged(user => {
                    unsub();
                    if (user) user.getIdToken().then(t => res(t)).catch(() => res(null));
                    else res(null);
                });
            })
        };

        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "genesys21.firebaseapp.com",
            projectId: "genesys21",
            storageBucket: "genesys21.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        try {
            if (firebaseConfig.apiKey !== "SUA_API_KEY") {
                firebase.initializeApp(firebaseConfig);
                globalThis.FirebaseAuthBridge.ready = true;
                console.log("FIREBASE: Initialized");
            } else {
                globalThis.FirebaseAuthBridge.ready = true;
                console.warn("FIREBASE: Not configured");
            }
        } catch (e) {
            globalThis.FirebaseAuthBridge.ready = true;
            console.error("FIREBASE: Error", e);
        }
    </script>
</head>
<body>
    <div id="ComposeTarget"></div>
    <script src="/skiko.js"></script>
    <script src="/composeApp.js"></script>
</body>
</html>
